version: 2
updates:
    - package-ecosystem: npm
      directory: /
      schedule:
          interval: weekly
      # минорные и патч-обновления приходят одним сгруппированным PR
      groups:
          minor-and-patch:
              update-types:
                  - minor
                  - patch

    - package-ecosystem: github-actions
      directory: /
      schedule:
          interval: weekly
